<section class="content">
    <h1>Mortgage Calculator</h1>
    <p>Use this tool to estimate your monthly mortgage payment.</p>

    <div class="calculator-box">

        <label for="loanAmount">Loan Amount ($):</label>
        <input type="number" id="loanAmount" placeholder="Enter loan amount">

        <label for="interestRate">Annual Interest Rate (%):</label>
        <input type="number" id="interestRate" step="0.01" placeholder="Enter interest rate">

        <label for="loanYears">Loan Term (Years):</label>
        <input type="number" id="loanYears" placeholder="Enter years">

        <button onclick="calculateMortgage()" class="calc-btn">Calculate</button>

        <h3>Monthly Payment:</h3>
        <div id="result" class="result-box">$0.00</div>

    </div>

</section>
